<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Routine matinale</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --card: #ffffff;
      --text: #111827;
      --muted: #1f2937;
      --primary: #064e3b;
      --primary-dark: #022c22;
      --warning: #8a3a00;
      --done: #174ea6;
      --border: #b8c2d0;
      --shadow: 0 20px 50px rgba(31, 41, 51, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #fffaf0 0, var(--bg) 42%, #edf2f7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    main {
      width: min(1080px, 100%);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .timer-panel { display: flex; flex-direction: column; gap: 22px; }

    h1 { margin: 0; font-size: clamp(1.6rem, 4vw, 2.6rem); line-height: 1.1; }
    h2 { margin: 0 0 14px; font-size: 1.15rem; }

    .subtitle { margin: 8px 0 0; color: var(--muted); font-size: 1rem; }

    .routine-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .routine-choice {
      color: var(--text);
      background: #cbd5e1;
      border: 2px solid transparent;
    }

    .routine-choice.active {
      color: var(--text);
      background: #dff4ef;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(6, 78, 59, 0.14);
    }

    .routine-card {
      display: none;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #f1f5f9;
      padding: 16px;
    }

    .routine-card.visible { display: block; }
    .routine-card p { margin: 0 0 10px; color: var(--muted); line-height: 1.45; }
    .routine-card strong { display: block; margin-bottom: 10px; color: var(--text); }
    .routine-image {
      width: 100%;
      max-height: var(--image-height, 260px);
      object-fit: contain;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #ffffff;
      margin-bottom: 12px;
    }
    .routine-image-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .routine-image-controls button {
      width: 44px;
      height: 44px;
      padding: 0;
      font-size: 1.35rem;
    }
    .routine-image-title { font-weight: 800; color: var(--text); }

    .timer-ring {
      position: relative;
      width: min(340px, 78vw);
      aspect-ratio: 1;
      margin: 4px auto;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--primary) var(--progress), #e7ecef 0);
      transition: background 0.4s linear;
    }

    .timer-ring::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      background: var(--card);
    }

    .timer-ring.running { animation: breathe 1.8s ease-in-out infinite; }

    .timer-content { position: relative; text-align: center; padding: 20px; }

    .time {
      font-variant-numeric: tabular-nums;
      font-size: clamp(3rem, 11vw, 5.2rem);
      font-weight: 750;
      letter-spacing: -0.06em;
    }

    .time-label { color: var(--muted); font-size: 0.95rem; margin-top: 4px; }

    .status {
      min-height: 62px;
      border-radius: 18px;
      background: #f1f5f9;
      border: 1px solid var(--border);
      padding: 16px;
      text-align: center;
      font-weight: 700;
      font-size: clamp(1.1rem, 3vw, 1.55rem);
    }

    .status.transition { color: var(--warning); background: #fff7ed; border-color: #fed7aa; }
    .status.done { color: var(--done); background: #eff6ff; border-color: #bfdbfe; }

    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

    .stat {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: #f8fafc;
    }

    .stat span { display: block; color: var(--muted); font-size: 0.86rem; margin-bottom: 4px; }
    .stat strong { font-size: 1.1rem; }

    .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

    button {
      border: 0;
      border-radius: 14px;
      padding: 13px 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      color: #ffffff;
      background: var(--primary);
      transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s ease;
    }

    button:hover { background: var(--primary-dark); transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: 1; color: #ffffff; background: #475569; transform: none; }

    .secondary { color: var(--text); background: #cbd5e1; }
    .routine-choice:hover {
      color: var(--text);
      background: #e2e8f0;
    }
    .routine-choice.active,
    .routine-choice.active:hover {
      color: var(--text);
      background: #dff4ef;
    }
    .secondary:hover { background: #b6c2d1; }

    ol {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
      max-height: 650px;
      overflow: auto;
    }

    li {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: #ffffff;
    }

    li .index {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 50%;
      background: #cbd5e1;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.85rem;
    }

    li.active { color: var(--text); border-color: var(--primary); background: #dff4ef; }
    li.active .index { color: #ffffff; background: var(--primary); }
    .exercise-label { font-weight: 800; }

    @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.015); } }

    @media (max-width: 820px) {
      body { align-items: flex-start; padding: 12px; }
      main { grid-template-columns: 1fr; }
      .panel { padding: 20px; border-radius: 22px; }
      .controls, .routine-buttons { grid-template-columns: 1fr; }
      ol { max-height: none; }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel timer-panel" aria-label="Minuteur de routine">
      <header>
        <h1>Routine matinale</h1>
        <p class="subtitle">Choisis une routine, puis lance le chronomètre.</p>
      </header>

      <div class="routine-buttons" id="routineButtons"></div>
      <div class="routine-card" id="routineCard"></div>

      <div class="timer-ring" id="timerRing" style="--progress: 0deg">
        <div class="timer-content">
          <div class="time" id="totalTime">12:00</div>
          <div class="time-label">temps total restant</div>
        </div>
      </div>

      <div class="status" id="statusMessage">Prêt à démarrer</div>

      <div class="stats">
        <div class="stat">
          <span>Minute en cours</span>
          <strong id="currentMinute">1 / 12</strong>
        </div>
        <div class="stat">
          <span>Exercice en cours</span>
          <strong id="currentExercise">Respiration et réveil articulaire</strong>
        </div>
      </div>

      <div class="controls">
        <button id="startButton">Démarrer</button>
        <button id="pauseButton" class="secondary" disabled>Pause</button>
        <button id="resetButton" class="secondary">Réinitialiser</button>
        <button id="fullscreenButton" class="secondary">Plein écran</button>
      </div>
    </section>

    <aside class="panel exercise-list" aria-label="Liste des exercices">
      <h2>Exercices</h2>
      <ol id="exerciseList"></ol>
    </aside>
  </main>

  <script>
    const routines = [
      {
        name: "Yoga doux",
        description: "Faire chaque module séparément, puis répéter la série.",
        image: "Capture d'écran 2026-06-23 172509.png",
        imageTitle: "1 salutation au soleil",
        exercises: [
          "1 salutation au soleil"
        ]
      },
      {
        name: "Pilates",
        description: "Routine douce pour respirer, mobiliser le bassin et renforcer le centre.",
        exercises: [
          "Respiration latérale : respirer sur les côtés des côtes en gardant les épaules relâchées.",
          "Bascule du bassin : incliner doucement le bassin vers l’avant puis vers l’arrière.",
          "Pont fessier : soulever le bassin lentement, puis redescendre avec contrôle.",
          "Cercle de jambes : dessiner de petits cercles avec une jambe sans bouger le bassin.",
          "Étirement d’une jambe : ramener une jambe vers soi et garder une respiration calme.",
          "Gainage sur les genoux : tenir le corps aligné en appui sur les genoux et les mains."
        ]
      },
      {
        name: "Parcours cognitif",
        description: "Routine de coordination, mobilité et attention avec déplacements, ballon, poids et repères au sol.",
        exercises: [
          "Pas chassé : se déplacer latéralement avec contrôle.",
          "Coordination bras-jambes : coup de pied, talons, puis bras vers l’arrière à droite et à gauche.",
          "Ballon : soulever le bassin, garder 3 points d’appui, puis lever un bras vers l’arrière. Garder l’équilibre et lever une jambe en hauteur.",
          "Poids : avec un poids dans chaque main, faire 5 répétitions à gauche puis à droite en décomposant le mouvement.",
          "Squat-boxe : enchaîner un squat, un geste de boxe.",
          "Slalom : salomer entre les plots selon la fatigue ou suivre le principe de la marelle."
        ]
      }
    ];

    const WORK_SECONDS = 60;
    const SERIES_COUNT = 2;
    const TRANSITION_SECONDS = 10;
    const ALARM_BEEP_COUNT = 6;
    const ALARM_BEEP_SPACING = 0.5;

    const routineButtonsEl = document.getElementById("routineButtons");
    const routineCardEl = document.getElementById("routineCard");
    const totalTimeEl = document.getElementById("totalTime");
    const currentMinuteEl = document.getElementById("currentMinute");
    const currentExerciseEl = document.getElementById("currentExercise");
    const statusMessageEl = document.getElementById("statusMessage");
    const timerRingEl = document.getElementById("timerRing");
    const exerciseListEl = document.getElementById("exerciseList");
    const startButton = document.getElementById("startButton");
    const pauseButton = document.getElementById("pauseButton");
    const resetButton = document.getElementById("resetButton");
    const fullscreenButton = document.getElementById("fullscreenButton");

    let selectedRoutineIndex = 0;
    let exercises = routines[selectedRoutineIndex].exercises;
    let totalWorkSeconds = exercises.length * SERIES_COUNT * WORK_SECONDS;
    let exerciseIndex = 0;
    let workRemaining = WORK_SECONDS;
    let totalRemaining = totalWorkSeconds;
    let transitionRemaining = TRANSITION_SECONDS;
    let isRunning = false;
    let isPaused = false;
    let isTransition = false;
    let intervalId = null;
    let audioContext = null;
    let imageHeight = 260;

    function renderRoutineButtons() {
      routineButtonsEl.innerHTML = routines.map((routine, index) => `
        <button class="routine-choice ${index === selectedRoutineIndex ? "active" : ""}" data-routine="${index}" type="button" aria-pressed="${index === selectedRoutineIndex}">${routine.name}</button>
      `).join("");
    }

    function renderRoutineCard() {
      const routine = routines[selectedRoutineIndex];
      routineCardEl.classList.add("visible");
      const imageMarkup = routine.image ? `<div class="routine-image-controls"><button type="button" data-image-zoom="out" aria-label="Réduire l'image">-</button><button type="button" data-image-zoom="in" aria-label="Agrandir l'image">+</button></div><img class="routine-image" src="${routine.image}" alt="${routine.imageTitle || routine.name}" style="--image-height: ${imageHeight}px"><p class="routine-image-title">${routine.imageTitle}</p>` : "";
      routineCardEl.innerHTML = `
        <strong>${routine.name}</strong>
        ${imageMarkup}
        <p>${routine.description}</p>
        <p>Chaque exercice dure 1 minute. La série de ${routine.exercises.length} exercice${routine.exercises.length > 1 ? "s" : ""} est répétée ${SERIES_COUNT} fois, avec ${TRANSITION_SECONDS} secondes de transition.</p>
      `;
    }

    function formatExercise(exercise) {
      const separatorIndex = exercise.indexOf(":");
      if (separatorIndex === -1) return exercise;

      const title = exercise.slice(0, separatorIndex);
      const details = exercise.slice(separatorIndex);
      return `<span class="exercise-label">${title}</span>${details}`;
    }

    function renderExerciseList() {
      exerciseListEl.innerHTML = exercises.map((exercise, index) => `
        <li class="${index === exerciseIndex % exercises.length ? "active" : ""}">
          <span class="index">${index + 1}</span>
          <span>${formatExercise(exercise)}</span>
        </li>
      `).join("");
    }

    function formatTime(seconds) {
      const minutes = Math.floor(seconds / 60).toString().padStart(2, "0");
      const rest = (seconds % 60).toString().padStart(2, "0");
      return `${minutes}:${rest}`;
    }

    function playAlarm() {
      audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
      audioContext.resume?.();

      for (let i = 0; i < ALARM_BEEP_COUNT; i += 1) {
        const startTime = audioContext.currentTime + i * ALARM_BEEP_SPACING;
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();

        oscillator.type = "square";
        oscillator.frequency.setValueAtTime(1200, startTime);
        oscillator.frequency.setValueAtTime(900, startTime + 0.18);
        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(0.85, startTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.32);

        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start(startTime);
        oscillator.stop(startTime + 0.35);
      }
    }

    function updateDisplay() {
      totalTimeEl.textContent = formatTime(totalRemaining);
      currentMinuteEl.textContent = `${exerciseIndex + 1} / ${exercises.length * SERIES_COUNT}`;
      currentExerciseEl.textContent = exercises[exerciseIndex % exercises.length] || "Séance terminée";

      const progress = ((totalWorkSeconds - totalRemaining) / totalWorkSeconds) * 360;
      timerRingEl.style.setProperty("--progress", `${progress}deg`);
      timerRingEl.classList.toggle("running", isRunning && !isPaused && !isTransition);

      if (isTransition) {
        statusMessageEl.textContent = `Change d’exercice - reprise dans ${transitionRemaining}s`;
        statusMessageEl.className = "status transition";
      } else if (totalRemaining === 0) {
        statusMessageEl.textContent = "Séance terminée";
        statusMessageEl.className = "status done";
      } else if (isPaused) {
        statusMessageEl.textContent = "Pause";
        statusMessageEl.className = "status";
      } else if (isRunning) {
        statusMessageEl.textContent = `${formatTime(workRemaining)} pour cet exercice`;
        statusMessageEl.className = "status";
      } else {
        statusMessageEl.textContent = "Prêt à démarrer";
        statusMessageEl.className = "status";
      }

      renderRoutineButtons();
      renderRoutineCard();
      renderExerciseList();
    }

    function resetTimer() {
      clearInterval(intervalId);
      intervalId = null;
      exerciseIndex = 0;
      workRemaining = WORK_SECONDS;
      totalRemaining = totalWorkSeconds;
      transitionRemaining = TRANSITION_SECONDS;
      isRunning = false;
      isPaused = false;
      isTransition = false;
      startButton.disabled = false;
      pauseButton.disabled = true;
      pauseButton.textContent = "Pause";
      updateDisplay();
    }

    function selectRoutine(index) {
      selectedRoutineIndex = index;
      exercises = routines[selectedRoutineIndex].exercises;
      totalWorkSeconds = exercises.length * SERIES_COUNT * WORK_SECONDS;
      resetTimer();
    }

    function finishSession() {
      clearInterval(intervalId);
      intervalId = null;
      isRunning = false;
      isPaused = false;
      isTransition = false;
      startButton.disabled = false;
      pauseButton.disabled = true;
      pauseButton.textContent = "Pause";
      playAlarm();
      updateDisplay();
    }

    function moveToNextExercise() {
      exerciseIndex += 1;
      workRemaining = WORK_SECONDS;
      isTransition = false;
      transitionRemaining = TRANSITION_SECONDS;

      if (exerciseIndex >= exercises.length * SERIES_COUNT) {
        totalRemaining = 0;
        finishSession();
        return;
      }

      updateDisplay();
    }

    function tick() {
      if (!isRunning || isPaused) return;

      if (isTransition) {
        transitionRemaining -= 1;
        if (transitionRemaining <= 0) moveToNextExercise();
        else updateDisplay();
        return;
      }

      workRemaining -= 1;
      totalRemaining -= 1;

      if (totalRemaining <= 0) {
        totalRemaining = 0;
        workRemaining = 0;
        finishSession();
        return;
      }

      if (workRemaining <= 0) {
        playAlarm();
        isTransition = true;
        transitionRemaining = TRANSITION_SECONDS;
      }

      updateDisplay();
    }

    function startTimer() {
      if (isRunning) return;

      isRunning = true;
      isPaused = false;
      startButton.disabled = true;
      pauseButton.disabled = false;
      pauseButton.textContent = "Pause";
      updateDisplay();
      intervalId = setInterval(tick, 1000);
    }

    function togglePause() {
      if (!isRunning) return;

      isPaused = !isPaused;
      pauseButton.textContent = isPaused ? "Reprendre" : "Pause";
      updateDisplay();
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
    }

    function resizeRoutineImage(direction) {
      imageHeight = Math.max(160, Math.min(700, imageHeight + direction * 60));
      renderRoutineCard();
    }

    routineCardEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-image-zoom]");
      if (!button) return;
      resizeRoutineImage(button.dataset.imageZoom === "in" ? 1 : -1);
    });

    routineButtonsEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-routine]");
      if (!button) return;
      selectRoutine(Number(button.dataset.routine));
    });

    startButton.addEventListener("click", startTimer);
    pauseButton.addEventListener("click", togglePause);
    resetButton.addEventListener("click", resetTimer);
    fullscreenButton.addEventListener("click", toggleFullscreen);

    updateDisplay();
  </script>
</body>
</html>
