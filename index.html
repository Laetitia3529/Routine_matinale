<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Routine matinale</title>
  <style>
    /* =============================================
       VARIABLES GLOBALES — couleurs, ombres
    ============================================= */
    :root {
      --bg: #f6f3ee;
      --card: #ffffff;
      --text: #111827;
      --muted: #1f2937;
      --primary: #064e3b;
      --primary-dark: #022c22;
      --warning: #8a3a00;
      --done: #174ea6;
      --border: #b8c2d0;
      --shadow: 0 20px 50px rgba(31, 41, 51, 0.12);
    }

    /* === Mise en page de base === */
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #fffaf0 0, var(--bg) 42%, #edf2f7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* === Grille principale : panneau minuteur (gauche) + panneau exercices (droite) === */
    main {
      width: min(1080px, 100%);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
    }

    /* === Carte blanche générique (utilisée par les deux panneaux) === */
    .panel {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    /* === Panneau minuteur : disposition verticale === */
    .timer-panel { display: flex; flex-direction: column; gap: 22px; }

    /* === Titres === */
    h1 { margin: 0; font-size: clamp(1.6rem, 4vw, 2.6rem); line-height: 1.1; }
    h2 { margin: 0 0 14px; font-size: 1.15rem; }

    .subtitle { margin: 8px 0 0; color: var(--muted); font-size: 1rem; }

    /* === En-tête : titre à gauche, sélecteur de langue à droite === */
    header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; }
    .header-text { flex: 1; min-width: 0; }
    .lang-switcher { display: flex; gap: 6px; padding-top: 4px; flex-shrink: 0; }
    .lang-btn { padding: 5px 12px; font-size: 0.82rem; border-radius: 10px; background: #cbd5e1; color: var(--text); border: 2px solid transparent; }
    .lang-btn.active { background: #dff4ef; border-color: var(--primary); color: var(--text); }
    .lang-btn:hover { color: var(--text); background: #e2e8f0; }
    .lang-btn.active:hover { color: var(--text); background: #dff4ef; }

    /* === Grille de boutons de sélection de routine (3 colonnes) === */
    .routine-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    /* === Bouton de routine : état par défaut (gris), actif (vert clair) === */
    .routine-choice {
      color: var(--text);
      background: #cbd5e1;
      border: 2px solid transparent;
    }

    .routine-choice.active {
      color: var(--text);
      background: #dff4ef;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(6, 78, 59, 0.14);
    }

    /* === Carte de description de la routine sélectionnée (cachée par défaut) === */
    .routine-card {
      display: none;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #f1f5f9;
      padding: 16px;
    }

    .routine-card.visible { display: block; }
    .routine-card p { margin: 0 0 10px; color: var(--muted); line-height: 1.45; }
    .routine-card strong { display: block; margin-bottom: 10px; color: var(--text); }
    /* === Image illustrative de la routine (hauteur pilotée par JS via --image-height) === */
    .routine-image {
      width: 100%;
      max-height: var(--image-height, 260px);
      object-fit: contain;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #ffffff;
      margin-bottom: 12px;
    }
    /* === Contrôles zoom image : boutons + et - === */
    .routine-image-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .routine-image-controls button {
      width: 44px;
      height: 44px;
      padding: 0;
      font-size: 1.35rem;
    }
    .routine-image-title { font-weight: 800; color: var(--text); }

    /* =============================================
       MINUTEUR RECTANGLE
       Carte pleine largeur + barre de progression linéaire
    ============================================= */
    .timer-ring {
      position: relative;
      width: 100%;
      margin: 0;
      border-radius: 18px;
      background: #f1f5f9;
      border: 1px solid var(--border);
      padding: 22px 16px 30px;
      text-align: center;
      transition: border-color 0.4s;
    }

    /* Piste de progression (fond gris) en bas du rectangle */
    .timer-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: #e7ecef;
      border-radius: 0 0 18px 18px;
    }
    /* Remplissage vert piloté par JS (style.width) */
    .timer-progress-fill {
      height: 100%;
      width: 0%;
      background: var(--primary);
      border-radius: 0 0 0 18px;
      transition: width 0.9s linear;
    }

    /* Bord vert + légère pulsation pendant la séance active */
    .timer-ring.running { border-color: var(--primary); animation: breathe 1.8s ease-in-out infinite; }

    /* === Texte dans le minuteur rectangle === */
    .timer-content { text-align: center; padding: 0; }

    .time {
      font-variant-numeric: tabular-nums;
      font-size: clamp(2.2rem, 8vw, 3.8rem);
      font-weight: 750;
      letter-spacing: -0.06em;
    }

    .time-label { color: var(--muted); font-size: 0.95rem; margin-top: 4px; }

    /* =============================================
       BANDEAU DE STATUT
       Prêt / En cours / Transition / Terminé
    ============================================= */
    .status {
      min-height: 62px;
      border-radius: 18px;
      background: #f1f5f9;
      border: 1px solid var(--border);
      padding: 16px;
      text-align: center;
      font-weight: 700;
      font-size: clamp(1.1rem, 3vw, 1.55rem);
    }

    .status.transition { color: var(--warning); background: #fff7ed; border-color: #fed7aa; }
    .status.done { color: var(--done); background: #eff6ff; border-color: #bfdbfe; }

    /* === Statistiques : minute et exercice en cours (2 colonnes) === */
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

    .stat {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: #f8fafc;
    }

    .stat span { display: block; color: var(--muted); font-size: 0.86rem; margin-bottom: 4px; }
    .stat strong { font-size: 1.1rem; }

    /* === Barre de contrôles : 4 boutons (Démarrer / Pause / Réinitialiser / Plein écran) === */
    .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

    /* === Style global des boutons === */
    button {
      border: 0;
      border-radius: 14px;
      padding: 13px 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      color: #ffffff;
      background: var(--primary);
      transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s ease;
    }

    button:hover { background: var(--primary-dark); transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: 1; color: #ffffff; background: #475569; transform: none; }

    .secondary { color: var(--text); background: #cbd5e1; }
    .routine-choice:hover {
      color: var(--text);
      background: #e2e8f0;
    }
    .routine-choice.active,
    .routine-choice.active:hover {
      color: var(--text);
      background: #dff4ef;
    }
    .secondary:hover { background: #b6c2d1; }

    /* === Liste ordonnée des exercices (panneau droit) === */
    ol {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
      max-height: 650px;
      overflow: auto;
    }

    li {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: #ffffff;
    }

    li .index {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 50%;
      background: #cbd5e1;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.85rem;
    }

    /* === Exercice actuellement en cours (surligné en vert) === */
    li.active { color: var(--text); border-color: var(--primary); background: #dff4ef; }
    li.active .index { color: #ffffff; background: var(--primary); }
    /* Partie avant le « : » mise en gras dans chaque exercice */
    .exercise-label { font-weight: 800; }

    /* === Contenu de l'exercice : texte + badge temps === */
    .exercise-content { display: flex; flex-direction: column; flex: 1; min-width: 0; }
    .exercise-time {
      display: block;
      margin-top: 4px;
      font-size: 0.74rem;
      font-weight: 600;
      color: var(--muted);
      opacity: 0.75;
    }
    li.active .exercise-time { color: var(--primary); opacity: 1; font-weight: 800; }
    li .index { margin-top: 2px; }

    /* Légère pulsation de l'anneau pour signaler que le timer tourne */
    @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.015); } }

    /* === Responsive : empilement vertical sur mobile (< 820px) === */
    @media (max-width: 820px) {
      body { align-items: flex-start; padding: 12px; }
      main { grid-template-columns: 1fr; }
      .panel { padding: 20px; border-radius: 22px; }
      .controls { grid-template-columns: repeat(2, 1fr); }
      .routine-buttons { grid-template-columns: repeat(2, 1fr); }
      ol { max-height: none; overflow: visible; }
      .exercise-time { font-size: 0.82rem; opacity: 1; }
    }

    /* =============================================
       ACCESSIBILITÉ (RGAA)
    ============================================= */

    /* Lien d'évitement : caché hors focus, visible à la navigation clavier */
    .skip-link {
      position: absolute;
      top: -60px;
      left: 8px;
      background: var(--primary);
      color: #ffffff;
      padding: 10px 18px;
      border-radius: 0 0 12px 12px;
      font-weight: 800;
      font-size: 0.95rem;
      z-index: 9999;
      text-decoration: none;
      transition: top 0.2s ease;
    }
    .skip-link:focus { top: 0; outline: 3px solid #ffffff; outline-offset: 2px; }

    /* Anneau de focus visible pour tous les éléments interactifs */
    :focus-visible {
      outline: 3px solid var(--primary);
      outline-offset: 3px;
      border-radius: 6px;
    }

    /* Désactive les animations si l'utilisateur a activé « Réduire les animations » */
    @media (prefers-reduced-motion: reduce) {
      .timer-ring.running { animation: none; }
      * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
    }

    /* ── Wake Lock indicator — badge fixe en bas à droite, hors du flux de la page ── */
    #wakeLockIndicator {
      position: fixed;
      bottom: 14px;
      right: 14px;
      z-index: 200;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--primary);
      background: #d1fae5;
      border: 1px solid #6ee7b7;
      border-radius: 20px;
      padding: 4px 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      user-select: none;
    }
    #wakeLockIndicator::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--primary);
      animation: wl-pulse 2s ease-in-out infinite;
    }
    @keyframes wl-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
    @media (prefers-reduced-motion: reduce) {
      #wakeLockIndicator::before { animation: none; }
    }

    /* === Bandeau recommandation navigateur === */
    #browserBanner {
      display: none; /* caché par défaut, activé via .visible */
      position: sticky;
      top: 0;
      z-index: 400;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #fef3c7;
      border-bottom: 2px solid #f59e0b;
      color: #78350f;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 10px 18px;
    }
    #browserBanner.visible { display: flex; }
    #browserBanner button {
      flex: 0 0 auto;
      background: none;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      color: #78350f;
      padding: 2px 8px;
      line-height: 1.6;
    }
    #browserBanner button:hover { background: #fde68a; }
  </style>
</head>
<body>
  <!-- Lien d'évitement (accessibilité) : permet aux utilisateurs de lecteur d'écran de sauter la navigation -->
  <a href="#mainContent" class="skip-link" id="skipLink">Passer au contenu principal</a>

  <!-- Bandeau recommandation Chrome (masqué par défaut, visible si non-Chrome) -->
  <div id="browserBanner" role="alert" aria-live="polite">
    <span id="browserBannerText"></span>
    <button type="button" id="browserBannerClose">&#x2715;</button>
  </div>

  <!-- Grille principale : panneau minuteur à gauche, liste exercices à droite -->
  <main id="mainContent">
    <!-- ======================================================
         PANNEAU GAUCHE : sélection de routine + minuteur
    ====================================================== -->
    <section class="panel timer-panel" id="timerSection" aria-label="Minuteur de routine">

      <!-- En-tête : titre du site + boutons de choix de langue -->
      <header>
        <div class="header-text">
          <h1 id="pageTitle">Routine matinale</h1>
          <p class="subtitle" id="pageSubtitle">Choisis une routine, puis lance le chronomètre.</p>
        </div>
        <div class="lang-switcher" id="langSwitcher"></div>
        <!-- Indicateur wake lock : visible uniquement quand le verrou écran est actif -->
        <span id="wakeLockIndicator" hidden aria-live="polite" aria-label="Écran allumé activé">Écran allumé</span>
      </header>

      <!-- Boutons de sélection de routine (générés par JS via renderRoutineButtons) -->
      <div class="routine-buttons" id="routineButtons"></div>

      <!-- Carte de description de la routine sélectionnée (générée par JS via renderRoutineCard) -->
      <div class="routine-card" id="routineCard"></div>

      <!-- Minuteur rectangle : barre de progression pilotée par JS via timerProgressFillEl.style.width -->
      <div class="timer-ring" id="timerRing" role="timer" aria-label="Minuteur" style="--progress: 0deg">
        <div class="timer-content">
          <div class="time" id="totalTime">12:00</div>
          <div class="time-label" id="timeLabel">temps total restant</div>
        </div>
        <div class="timer-progress" aria-hidden="true">
          <div class="timer-progress-fill" id="timerProgressFill"></div>
        </div>
      </div>

      <!-- Message d'état annoncé aux lecteurs d'écran via aria-live -->
      <div class="status" id="statusMessage" role="status" aria-live="polite" aria-atomic="true">Prêt à démarrer</div>

      <!-- Statistiques en temps réel : minute et exercice actuels -->
      <div class="stats">
        <div class="stat">
          <span id="minuteLabel">Minute en cours</span>
          <strong id="currentMinute">1 / 12</strong>
        </div>
        <div class="stat">
          <span id="exerciseLabel">Exercice en cours</span>
          <strong id="currentExercise" aria-live="polite" aria-atomic="true">Respiration et réveil articulaire</strong>
        </div>
      </div>

      <!-- Boutons de contrôle du timer -->
      <div class="controls">
        <button id="startButton">Démarrer</button>
        <button id="pauseButton" class="secondary" disabled>Pause</button>
        <button id="resetButton" class="secondary">Réinitialiser</button>
        <button id="fullscreenButton" class="secondary">Plein écran</button>
      </div>
    </section>

    <!-- ======================================================
         PANNEAU DROIT : liste des exercices de la routine
    ====================================================== -->
    <aside class="panel exercise-list" id="exerciseSection" aria-label="Liste des exercices">
      <h2 id="exercisesHeading">Exercices</h2>
      <ol id="exerciseList"></ol>
    </aside>
  </main>

          }
        ]
      }
    };

    /* =============================================
       CONSTANTES DU TIMER
    ============================================= */
    const WORK_SECONDS = 60;        // Durée d'un exercice en secondes
    const SERIES_COUNT = 2;         // Nombre de répétitions de la série complète
    const TRANSITION_SECONDS = 10;  // Pause entre deux exercices
    const ALARM_BEEP_COUNT = 6;     // Nombre de bips sonores à la fin d'un exercice
    const ALARM_BEEP_SPACING = 0.5; // Intervalle entre chaque bip (secondes)

    /* =============================================
       RÉFÉRENCES AUX ÉLÉMENTS DU DOM
       Récupérées une seule fois au chargement
    ============================================= */
    const routineButtonsEl = document.getElementById("routineButtons");
    const routineCardEl = document.getElementById("routineCard");
    const totalTimeEl = document.getElementById("totalTime");
    const currentMinuteEl = document.getElementById("currentMinute");
    const currentExerciseEl = document.getElementById("currentExercise");
    const statusMessageEl = document.getElementById("statusMessage");
    const timerRingEl = document.getElementById("timerRing");
    const timerProgressFillEl = document.getElementById("timerProgressFill");
    const exerciseListEl = document.getElementById("exerciseList");
    const startButton = document.getElementById("startButton");
    const pauseButton = document.getElementById("pauseButton");
    const resetButton = document.getElementById("resetButton");
    const fullscreenButton = document.getElementById("fullscreenButton");
    const pageTitleEl = document.getElementById("pageTitle");
    const pageSubtitleEl = document.getElementById("pageSubtitle");
    const exercisesHeadingEl = document.getElementById("exercisesHeading");
    const minuteLabelEl = document.getElementById("minuteLabel");
    const exerciseLabelEl = document.getElementById("exerciseLabel");
    const timeLabelEl = document.getElementById("timeLabel");
    const langSwitcherEl = document.getElementById("langSwitcher");
    const skipLinkEl = document.getElementById("skipLink");
    const browserBannerEl = document.getElementById("browserBanner");
    const browserBannerTextEl = document.getElementById("browserBannerText");
    const timerSectionEl = document.getElementById("timerSection");
    const exerciseSectionEl = document.getElementById("exerciseSection");

    /* =============================================
       ÉTAT DE L'APPLICATION
       Variables qui changent au fil de la séance
    ============================================= */
    let selectedRoutineIndex = 0;  // Index de la routine active dans le tableau
    let exercises = translations[currentLang].routines[selectedRoutineIndex].exercises;
    let totalWorkSeconds = exercises.length * SERIES_COUNT * WORK_SECONDS;
    let exerciseIndex = 0;          // Index de l'exercice en cours (parmi series × exercices)
    let workRemaining = WORK_SECONDS;          // Secondes restantes pour l'exercice en cours
    let totalRemaining = totalWorkSeconds;     // Secondes restantes pour toute la séance
    let transitionRemaining = TRANSITION_SECONDS; // Secondes de la pause inter-exercice
    let isRunning = false;     // true si le timer tourne
    let isPaused = false;      // true si la séance est en pause
    let isTransition = false;  // true pendant la pause entre deux exercices
    let intervalId = null;     // Identifiant du setInterval (pour pouvoir l'arrêter)
    let audioContext = null;   // Contexte audio Web Audio API (créé à la première utilisation)
    let imageHeight = 260;     // Hauteur courante de l'image de routine (en pixels)

    /* =============================================
       UTILITAIRES
    ============================================= */

    /* Raccourci pour accéder à une clé de traduction dans la langue courante */
    function t(key) { return translations[currentLang][key]; }

    /* Retourne le tableau de routines de la langue courante */
    function routines() { return translations[currentLang].routines; }

    /* =============================================
       FONCTIONS DE RENDU (DOM)
    ============================================= */

    /* Génère les boutons FR / EN / ES dans le header */
    function renderLangButtons() {
      langSwitcherEl.innerHTML = LANGS.map(lang => `
        <button class="lang-btn ${lang === currentLang ? "active" : ""}" data-lang="${lang}" type="button">${lang.toUpperCase()}</button>
      `).join("");
    }

    /* Met à jour tous les textes statiques de la page (titre, libellés, boutons)
       ainsi que l'attribut lang du document pour les lecteurs d'écran */
    function updateStaticText() {
      document.documentElement.lang = translations[currentLang].htmlLang;
      document.title = t("pageTitle");
      pageTitleEl.textContent = t("pageTitle");
      pageSubtitleEl.textContent = t("subtitle");
      exercisesHeadingEl.textContent = t("exercisesHeading");
      minuteLabelEl.textContent = t("minuteLabel");
      exerciseLabelEl.textContent = t("exerciseLabel");
      timeLabelEl.textContent = t("timeLabel");
      startButton.textContent = t("startBtn");
      resetButton.textContent = t("resetBtn");
      fullscreenButton.textContent = t("fullscreenBtn");
      pauseButton.textContent = isPaused ? t("resumeBtn") : t("pauseBtn");
      skipLinkEl.textContent = t("skipLink");
      browserBannerTextEl.textContent = t("browserBannerMsg");
      timerSectionEl.setAttribute("aria-label", t("timerSectionLabel"));
      exerciseSectionEl.setAttribute("aria-label", t("exerciseListLabel"));
    }

    /* Change la langue active, recalcule les données de la routine
       et rafraîchit complètement l'interface.
       IMPORTANT : appelle resetTimer() pour stopper l'intervalle en cours
       et réinitialiser tous les compteurs (exerciseIndex inclus). */
    function setLanguage(lang) {
      currentLang = lang;
      exercises = routines()[selectedRoutineIndex].exercises;
      totalWorkSeconds = exercises.length * SERIES_COUNT * WORK_SECONDS;
      renderLangButtons();
      updateStaticText();
      resetTimer();
    }

    /* Affiche les boutons de sélection de routine ; marque celui sélectionné avec
       la classe "active" et l'attribut aria-pressed pour l'accessibilité */
    function renderRoutineButtons() {
      routineButtonsEl.innerHTML = routines().map((routine, index) => `
        <button class="routine-choice ${index === selectedRoutineIndex ? "active" : ""}" data-routine="${index}" type="button" aria-pressed="${index === selectedRoutineIndex}">${routine.name}</button>
      `).join("");
    }

    /* Affiche la carte de description de la routine sélectionnée :
       nom, image (avec contrôles zoom), description et info sur la durée totale */
    function renderRoutineCard() {
      const routine = routines()[selectedRoutineIndex];
      routineCardEl.classList.add("visible");
      const imageMarkup = routine.image ? `<div class="routine-image-controls"><button type="button" data-image-zoom="out" aria-label="${t("zoomOut")}">-</button><button type="button" data-image-zoom="in" aria-label="${t("zoomIn")}">+</button></div><img class="routine-image" src="${routine.image}" alt="${routine.imageTitle || routine.name}" style="--image-height: ${imageHeight}px"><p class="routine-image-title">${routine.imageTitle}</p>` : "";
      routineCardEl.innerHTML = `
        <strong>${routine.name}</strong>
        ${imageMarkup}
        <p>${routine.description}</p>
        <p>${t("cardSeriesInfo")(routine.exercises.length, SERIES_COUNT, TRANSITION_SECONDS)}</p>
      `;
    }

    /* Formate un exercice : met en gras le texte avant le " : "
       Ex : "Respiration latérale : respirer..." → <strong>Respiration latérale</strong> : respirer... */
    function formatExercise(exercise) {
      const separatorIndex = exercise.indexOf(":");
      if (separatorIndex === -1) return exercise;
      const title = exercise.slice(0, separatorIndex);
      const details = exercise.slice(separatorIndex);
      return `<span class="exercise-label">${title}</span>${details}`;
    }

    /* Affiche la liste des exercices dans le panneau droit.
       L'exercice actif est mis en évidence et marqué aria-current pour les lecteurs d'écran */
    function renderExerciseList() {
      const active = exerciseIndex % exercises.length;
      exerciseListEl.innerHTML = exercises.map((exercise, index) => {
        const isActive = index === active;
        let timeText;
        if (isActive && isTransition) {
          timeText = t("exerciseRemaining")(`${transitionRemaining}s`);
        } else if (isActive) {
          timeText = t("exerciseRemaining")(formatTime(workRemaining));
        } else {
          timeText = t("exerciseComing");
        }
        return `
          <li class="${isActive ? "active" : ""}" ${isActive ? 'aria-current="true"' : ""}>
            <span class="index" aria-hidden="true">${index + 1}</span>
            <span class="exercise-content">
              <span>${formatExercise(exercise)}</span>
              <span class="exercise-time">${timeText}</span>
            </span>
          </li>
        `;
      }).join("");
    }

    /* Convertit un nombre de secondes en chaîne MM:SS (ex : 125 → "02:05") */
    function formatTime(seconds) {
      const minutes = Math.floor(seconds / 60).toString().padStart(2, "0");
      const rest = (seconds % 60).toString().padStart(2, "0");
      return `${minutes}:${rest}`;
    }

    /* Joue une série de bips sonores via la Web Audio API
       pour signaler la fin d'un exercice.
       L'AudioContext est créé paresseusement (après un geste utilisateur) */
    function playAlarm() {
      audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
      audioContext.resume?.();

      for (let i = 0; i < ALARM_BEEP_COUNT; i += 1) {
        const startTime = audioContext.currentTime + i * ALARM_BEEP_SPACING;
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();

        oscillator.type = "square";
        oscillator.frequency.setValueAtTime(1200, startTime);
        oscillator.frequency.setValueAtTime(900, startTime + 0.18);
        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(0.85, startTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.32);

        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start(startTime);
        oscillator.stop(startTime + 0.35);
      }
    }

    /* Met à jour les éléments visuels qui changent chaque seconde :
       - temps restant et progression de l'anneau
       - message de statut (en cours / pause / transition / terminé)
       - liste des exercices (mise en évidence de l'exercice actif)
       NOTE : renderRoutineButtons et renderRoutineCard NE sont PAS appelés ici
       car ils recréent des nœuds DOM (perte de focus clavier). Ils sont appelés
       uniquement lors d'un changement de routine ou de langue (via resetTimer). */
    function updateDisplay() {
      totalTimeEl.textContent = formatTime(totalRemaining);
      currentMinuteEl.textContent = `${exerciseIndex + 1} / ${exercises.length * SERIES_COUNT}`;
      currentExerciseEl.textContent = exercises[exerciseIndex % exercises.length] || t("doneMsg");

      const progress = ((totalWorkSeconds - totalRemaining) / totalWorkSeconds) * 360;
      timerRingEl.style.setProperty("--progress", `${progress}deg`);
      timerProgressFillEl.style.width = `${((totalWorkSeconds - totalRemaining) / totalWorkSeconds) * 100}%`;
      timerRingEl.classList.toggle("running", isRunning && !isPaused && !isTransition);

      if (isTransition) {
        statusMessageEl.textContent = t("transitionMsg")(transitionRemaining);
        statusMessageEl.className = "status transition";
      } else if (totalRemaining === 0) {
        statusMessageEl.textContent = t("doneMsg");
        statusMessageEl.className = "status done";
      } else if (isPaused) {
        statusMessageEl.textContent = t("pauseMsg");
        statusMessageEl.className = "status";
      } else if (isRunning) {
        statusMessageEl.textContent = t("exerciseMsg")(formatTime(workRemaining));
        statusMessageEl.className = "status";
      } else {
        statusMessageEl.textContent = t("readyMsg");
        statusMessageEl.className = "status";
      }

      renderExerciseList();
    }

    /* Remet le timer à zéro pour la routine en cours
       (arrête le comptage, réinitialise tous les compteurs).
       Recrée aussi les boutons et la carte de routine car les données
       peuvent avoir changé (nouvelle routine ou nouvelle langue). */
    function resetTimer() {
      clearInterval(intervalId);
      intervalId = null;
      if ("speechSynthesis" in window) speechSynthesis.cancel(); /* stoppe le message vocal si reset */
      exerciseIndex = 0;
      workRemaining = WORK_SECONDS;
      totalRemaining = totalWorkSeconds;
      transitionRemaining = TRANSITION_SECONDS;
      isRunning = false;
      isPaused = false;
      isTransition = false;
      startButton.disabled = false;
      pauseButton.disabled = true;
      pauseButton.textContent = t("pauseBtn");
      renderRoutineButtons();
      renderRoutineCard();
      updateDisplay();
    }

    /* Sélectionne une nouvelle routine : charge ses exercices et réinitialise le timer */
    function selectRoutine(index) {
      selectedRoutineIndex = index;
      exercises = routines()[selectedRoutineIndex].exercises;
      totalWorkSeconds = exercises.length * SERIES_COUNT * WORK_SECONDS;
      resetTimer();
    }

    /* Prononce le message de fin de séance via la synthèse vocale du navigateur */
    function speakEndMessage() {
      if (!("speechSynthesis" in window)) return;
      speechSynthesis.cancel(); /* annule toute parole en cours */
      const utterance = new SpeechSynthesisUtterance(t("endMessage"));
      utterance.lang  = t("speechLang");
      utterance.rate  = 0.88;
      utterance.pitch = 1.05;
      speechSynthesis.speak(utterance);
    }

    /* Clôture la séance : arrête le timer, joue l'alarme finale, met à jour l'affichage */
    function finishSession() {
      clearInterval(intervalId);
      intervalId = null;
      isRunning = false;
      isPaused = false;
      isTransition = false;
      startButton.disabled = false;
      pauseButton.disabled = true;
      pauseButton.textContent = t("pauseBtn");
      playAlarm();
      /* Le message vocal démarre après les bips (6 bips × 0,5 s ≈ 3,5 s) */
      setTimeout(speakEndMessage, 3500);
      updateDisplay();
    }

    /* Passe à l'exercice suivant après la période de transition.
       Si tous les exercices de toutes les séries sont faits, clôture la séance */
    function moveToNextExercise() {
      exerciseIndex += 1;
      workRemaining = WORK_SECONDS;
      isTransition = false;
      transitionRemaining = TRANSITION_SECONDS;

      if (exerciseIndex >= exercises.length * SERIES_COUNT) {
        totalRemaining = 0;
        finishSession();
        return;
      }

      updateDisplay();
    }

    /* Fonction appelée chaque seconde par setInterval.
       Gère les deux modes : exercice en cours OU transition inter-exercice */
    function tick() {
      if (!isRunning || isPaused) return;

      if (isTransition) {
        transitionRemaining -= 1;
        if (transitionRemaining <= 0) moveToNextExercise();
        else updateDisplay();
        return;
      }

      workRemaining -= 1;
      totalRemaining -= 1;

      if (totalRemaining <= 0) {
        totalRemaining = 0;
        workRemaining = 0;
        finishSession();
        return;
      }

      if (workRemaining <= 0) {
        playAlarm();
        isTransition = true;
        transitionRemaining = TRANSITION_SECONDS;
      }

      updateDisplay();
    }

    /* Lance la séance : démarre le setInterval et met à jour les boutons */
    function startTimer() {
      if (isRunning) return;

      /* Initialiser et déverrouiller l'audio ICI, pendant le geste utilisateur.
         Sur iOS (WebKit), même Chrome utilise WebKit : créer l'AudioContext ne suffit pas,
         il faut jouer un tampon silencieux pour "déverrouiller" la sortie audio. */
      audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
      audioContext.resume?.();
      /* Tampon silencieux d'1 échantillon — déverrouille iOS sans être audible */
      try {
        const silentBuf = audioContext.createBuffer(1, 1, 22050);
        const silentSrc = audioContext.createBufferSource();
        silentSrc.buffer = silentBuf;
        silentSrc.connect(audioContext.destination);
        silentSrc.start(0);
      } catch (e) { /* ignore si déjà déverrouillé */ }

      isRunning = true;
      isPaused = false;
      startButton.disabled = true;
      pauseButton.disabled = false;
      pauseButton.textContent = t("pauseBtn");
      updateDisplay();
      intervalId = setInterval(tick, 1000);
      requestWakeLock(); /* Redemande le verrou après le geste utilisateur (requis sur mobile) */
    }

    /* Bascule entre pause et reprise de la séance */
    function togglePause() {
      if (!isRunning) return;

      isPaused = !isPaused;
      pauseButton.textContent = isPaused ? t("resumeBtn") : t("pauseBtn");
      updateDisplay();
    }

    /* Active ou quitte le mode plein écran du navigateur */
    function toggleFullscreen() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
    }

    /* Agrandit (+1) ou réduit (-1) l'image de la routine
       dans une plage de 160px à 700px, par pas de 60px */
    function resizeRoutineImage(direction) {
      imageHeight = Math.max(160, Math.min(700, imageHeight + direction * 60));
      renderRoutineCard();
    }

    /* =============================================
       ÉCOUTEURS D'ÉVÉNEMENTS
    ============================================= */

    /* Clic sur les boutons + / - de zoom de l'image dans la carte routine */
    routineCardEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-image-zoom]");
      if (!button) return;
      resizeRoutineImage(button.dataset.imageZoom === "in" ? 1 : -1);
    });

    /* Clic sur un bouton de sélection de routine */
    routineButtonsEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-routine]");
      if (!button) return;
      selectRoutine(Number(button.dataset.routine));
    });

    /* Clic sur un bouton de langue (FR / EN / ES) */
    langSwitcherEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-lang]");
      if (!button || button.dataset.lang === currentLang) return;
      setLanguage(button.dataset.lang);
    });

    /* Boutons de contrôle principaux */
    startButton.addEventListener("click", startTimer);
    pauseButton.addEventListener("click", togglePause);
    resetButton.addEventListener("click", resetTimer);
    fullscreenButton.addEventListener("click", toggleFullscreen);

    /* =============================================
       WAKE LOCK — Écran toujours allumé
       Empêche l'écran de s'éteindre tant que l'onglet est actif
    ============================================= */
    let wakeLock = null;
    const wakeLockIndicatorEl = document.getElementById("wakeLockIndicator");

    /* Demande le verrou écran au navigateur */
    async function requestWakeLock() {
      if (!("wakeLock" in navigator)) {
        console.info("[WakeLock] API non supportée sur ce navigateur.");
        return;
      }
      try {
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLockIndicatorEl.hidden = false;
        /* Le navigateur relâche automatiquement le lock quand l'onglet passe en arrière-plan */
        wakeLock.addEventListener("release", () => {
          wakeLockIndicatorEl.hidden = true;
        });
      } catch (err) {
        console.warn("[WakeLock] Impossible d'activer le verrou écran :", err.message);
      }
    }

    /* Redemande le verrou quand l'utilisateur revient sur l'onglet */
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") requestWakeLock();
    });

    /* Libère proprement le verrou à la fermeture de la page */
    window.addEventListener("pagehide", () => {
      if (wakeLock) wakeLock.release();
    });

    /* =============================================
       INITIALISATION
       Exécuté une seule fois au chargement de la page
    ============================================= */
    renderLangButtons();    // Affiche les boutons de langue (FR / EN / ES)
    updateStaticText();     // Applique les traductions initiales (FR par défaut)
    renderRoutineButtons(); // Affiche les boutons de sélection de routine
    renderRoutineCard();    // Affiche la carte de la première routine
    updateDisplay();        // Affiche l'état initial du timer
    requestWakeLock();      // Active le verrou écran dès le chargement

    /* Sur iOS, l'AudioContext se suspend quand la page passe en arrière-plan.
       On le réactive dès que la page redevient visible. */
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && audioContext) {
        audioContext.resume?.();
      }
    });

    /* Affiche le bandeau si le navigateur n'est pas Chrome */
    const isChrome = /Chrome/.test(navigator.userAgent)
                  && !/Edg\//.test(navigator.userAgent)
                  && !/OPR\//.test(navigator.userAgent);
    if (!isChrome) {
      browserBannerEl.classList.add("visible");
      document.getElementById("browserBannerClose").addEventListener("click", () => {
        browserBannerEl.classList.remove("visible");
      });
    }
  </script>
</body>
</html>
